name: CI

on:
  push:
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run CLI smoke check
        run: python scripts/smoke_check.py

      - name: Run UI smoke check
        run: python scripts/ui_smoke_check.py

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run CLI smoke check
        run: python scripts/smoke_check.py

      - name: Run UI smoke check
        env:
          QT_QPA_PLATFORM: offscreen
        run: python scripts/ui_smoke_check.py
